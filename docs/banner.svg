  <text x="482" y="100" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="56" fill="#1C1917">Open</text>
  <text x="624" y="100" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="56" fill="#F97316">Wiki</text>

